<script>
// ===== 粒子系统 =====
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

    ctx.fillStyle = grad;
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    p.x += p.dx; p.y += p.dy;
    if (p.x < -p.r) p.x = canvas.width + p.r;
    if (p.x > canvas.width + p.r) p.x = -p.r;
    if (p.y < -p.r) p.y = canvas.height + p.r;
  requestAnimationFrame(drawParticles);
}
drawParticles();
 
// ===== 阵营数据 =====
const camps = {
  1: { name: 'AI 逆袭者', cls: 'modal-1' },
  2: { name: 'AI 实操派', cls: 'modal-2' },
  3: { name: 'AI 独行者', cls: 'modal-3' },
};
 
let currentCamp = null;
let registrations = JSON.parse(localStorage.getItem('pojuRegistrations') || '[]');
 
// ===== 弹窗 =====
function openModal(campId) {
  currentCamp = campId;
  const camp = camps[campId];
  const modal = document.getElementById('modal-box');
  modal.className = 'modal ' + camp.cls;
  document.getElementById('modal-camp-name').textContent = camp.name + ' 阵营';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-success').style.display = 'none';
  document.getElementById('modal-submit-btn').style.display = 'block';
  document.getElementById('modal-input').style.display = 'block';
  document.querySelector('.modal-label').style.display = 'block';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}
 
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  currentCamp = null;
}
 
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
 
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
 
// ===== Google Sheets 接口 =====
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyVIUht1iTbHBHPOnexKPOp0Mv7Fo1TpI9eVdFPvAvK_-4-lsHmw6yusAyma30oOLBf/exec';
 
// ===== 发送数据到Google Sheets =====
function sendToSheets(id, campName) {
  // 主方案：隐藏iframe表单提交（不受跨域限制，手机电脑所有浏览器通用）
  try {
    const form = document.createElement('form');
    form.method = 'GET';
    form.action = SHEET_URL;
    form.target = 'hidden-frame';
    form.style.display = 'none';
    const f1 = document.createElement('input');
    f1.type = 'hidden'; f1.name = 'id'; f1.value = id;
    const f2 = document.createElement('input');
    f2.type = 'hidden'; f2.name = 'camp'; f2.value = campName;
    form.appendChild(f1);
    form.appendChild(f2);
    document.body.appendChild(form);
    form.submit();
    setTimeout(() => { try { document.body.removeChild(form); } catch(e){} }, 3000);
  } catch(e) {}
  // 备用：fetch
  try { fetch(SHEET_URL + '?' + new URLSearchParams({id, camp: campName}), {mode:'no-cors'}).catch(()=>{}); } catch(e) {}
}
 
// ===== 提交 =====
function submitForm() {
  const input = document.getElementById('modal-input');
  const val = input.value.trim();
  if (!val) {
    input.style.borderColor = '#ff4444';
    setTimeout(() => input.style.borderColor = '', 1000);
    return;
  }
 
  const btn = document.getElementById('modal-submit-btn');
  const campName = camps[currentCamp].name;
 
  btn.textContent = '提交中...';
  btn.disabled = true;
 
  // 发送数据（iframe方案，全平台兼容）
  sendToSheets(val, campName);
 
  // 本地备份
  const record = { id: val, camp: campName, time: new Date().toLocaleString() };
  registrations.push(record);
  localStorage.setItem('pojuRegistrations', JSON.stringify(registrations));
  updateDataTable();
 
  // 显示成功
  setTimeout(() => {
    btn.style.display = 'none';
    input.style.display = 'none';
    document.querySelector('.modal-label').style.display = 'none';
    document.getElementById('success-camp').textContent = campName;
    document.getElementById('modal-success').style.display = 'block';
    setTimeout(closeModal, 2000);
  }, 400);
}
 
// ===== 数据表格 =====
function updateDataTable() {
  const tbody = document.getElementById('data-body');
  const empty = document.getElementById('data-empty');
  tbody.innerHTML = '';
  if (registrations.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  registrations.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.id}</td><td>${r.camp}</td>`;
    tbody.appendChild(tr);
  });
}
 
function toggleDataPanel() {
  const panel = document.getElementById('data-panel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
  updateDataTable();
}
 
// ===== 导出CSV =====
function exportCSV() {
  if (registrations.length === 0) { alert('暂无数据'); return; }
  let csv = '星球编号,阵营\n';
  registrations.forEach(r => { csv += `${r.id},${r.camp}\n`; });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '破局者图鉴报名数据.csv';
  a.click(); URL.revokeObjectURL(url);
}
 
updateDataTable();
